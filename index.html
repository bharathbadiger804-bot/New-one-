<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ENERGYIQ India</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- Link CSS -->
  <link rel="stylesheet" href="styles.css">
</head>

<body>
<div class="page">

<header>
  <div class="brand">
    <div class="brand-icon"></div>
    <div>
      <div class="brand-name"><span>ENERGYIQ</span></div>
      <div class="brand-sub">India Energy Tool</div>
    </div>
  </div>
</header>

<div class="card">
  <div class="card-label">Energy Calculator</div>

  <div class="form-grid">
    <div class="field">
      <label>Power (Watts)</label>
      <input type="number" id="power" placeholder="Enter watts">
    </div>

    <div class="field">
      <label>Time (Hours)</label>
      <input type="number" id="time" placeholder="Enter hours">
    </div>

    <div class="field full">
      <button onclick="calculateEnergy()">Calculate</button>
    </div>
  </div>

  <h3 id="result"></h3>
</div>

</div>

<!-- Link JS -->
<script src="script.js"></script>
</body>
</html>
